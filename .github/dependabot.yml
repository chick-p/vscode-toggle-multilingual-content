version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    cooldown:
      default-days: 3
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      eslint:
        patterns:
          - "@eslint/*"
          - "eslint"
          - "prettier"
          - "eslint-config-*"
          - "eslint-plugin-*"
          - "typescript-eslint"
